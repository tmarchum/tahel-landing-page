document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 #380A1A;\n    --ink: #1A0810;\n    --ink-soft: #7A5560;\n    --paper: #FFFFFF;\n    --line: rgba(33,6,15,0.10);\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; }\n  body {\n    font-family: 'Rubik', sans-serif;\n    background: var(--cream);\n    color: var(--ink);\n    overflow-x: clip;\n    font-weight: 400;\n    line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n  }\n  .display { font-family: 'Secular One', sans-serif; font-weight: 400; letter-spacing: -0.01em; line-height: 0.98; }\n  .kicker { font-weight: 800; font-size: 0.78rem; letter-spacing: 0.14em; text-transform: uppercase; }\n  img { display: block; max-width: 100%; }\n\n  /* Marquee */\n  .top-bar {\n    background: var(--ink);\n    color: var(--butter);\n    padding: 13px 0;\n    overflow: hidden;\n    position: sticky;\n    top: 0;\n    z-index: 100;\n  }\n  .marquee-track {\n    display: flex;\n    animation: marquee 32s linear infinite;\n    white-space: nowrap;\n    width: max-content;\n  }\n  .marquee-track span {\n    font-family: 'Secular One', sans-serif;\n    font-size: 0.95rem;\n    letter-spacing: 0.01em;\n    padding: 0 24px;\n    display: inline-flex;\n    align-items: center;\n    gap: 24px;\n  }\n  .marquee-track span::after { content: \"✦\"; color: var(--pink); }\n  @keyframes marquee {\n    from { transform: translateX(0); }\n    to { transform: translateX(50%); }\n  }\n\n  /* Nav */\n  nav.main {\n    padding: 20px 40px;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    background: var(--cream);\n  }\n  .logo { display: flex; align-items: center; gap: 12px; }\n  .logo-mark {\n    width: 42px; height: 42px;\n    border-radius: 14px;\n    background: var(--pink);\n    display: flex; align-items: center; justify-content: center;\n    color: var(--cream);\n    font-family: 'Secular One', sans-serif;\n    font-size: 1.5rem;\n    transform: rotate(-6deg);\n    box-shadow: 0 6px 0 var(--pink-deep);\n  }\n  .logo-text { font-family: 'Secular One', sans-serif; font-size: 1.7rem; line-height: 0.9; }\n  .logo-text small {\n    display: block;\n    font-family: 'Rubik', sans-serif;\n    font-size: 0.6rem;\n    font-weight: 700;\n    letter-spacing: 0.18em;\n    color: var(--pink);\n    text-transform: uppercase;\n    margin-top: 2px;\n  }\n  .nav-links { display: flex; gap: 30px; align-items: center; font-size: 0.98rem; font-weight: 600; }\n  .nav-links a { color: var(--ink); text-decoration: none; }\n  .nav-links a:not(.nav-cta):hover { color: var(--pink); }\n  .nav-links a.nav-cta {\n    background: var(--ink);\n    color: var(--cream);\n    padding: 12px 22px;\n    border-radius: 999px;\n    font-weight: 700;\n    transition: transform 0.2s, background 0.2s;\n  }\n  .nav-links a.nav-cta:hover { background: var(--pink); transform: translateY(-2px) rotate(-1deg); }\n\n  /* HERO */\n  .hero {\n    padding: 48px 40px 90px;\n    position: relative;\n  }\n  .hero-grid {\n    display: grid;\n    grid-template-columns: 1.05fr 0.95fr;\n    gap: 48px;\n    align-items: center;\n  }\n  .hero-eyebrow {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    background: var(--butter);\n    padding: 9px 16px;\n    border-radius: 999px;\n    width: fit-content;\n    margin-bottom: 26px;\n    font-weight: 700;\n    font-size: 0.85rem;\n    transform: rotate(-1.5deg);\n    box-shadow: 0 4px 0 rgba(33,6,15,0.12);\n  }\n  .hero-eyebrow .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--pink); animation: pulse 1.8s ease infinite; }\n  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:.5} }\n\n  h1.hero-title {\n    font-family: 'Secular One', sans-serif;\n    font-size: clamp(3.6rem, 8.5vw, 8.2rem);\n    line-height: 0.9;\n    letter-spacing: -0.02em;\n    margin-bottom: 26px;\n  }\n  h1.hero-title .hl {\n    color: var(--pink);\n    position: relative;\n    display: inline-block;\n  }\n  h1.hero-title .hl::after {\n    content: \"\";\n    position: absolute;\n    left: -2%; right: -2%; bottom: 6%;\n    height: 26%;\n    background: var(--butter);\n    z-index: -1;\n    transform: rotate(-1deg) scaleX(0);\n    transform-origin: right;\n    animation: highlight 0.7s 0.7s cubic-bezier(0.22,1,0.36,1) forwards;\n  }\n  @keyframes highlight { to { transform: rotate(-1deg) scaleX(1); } }\n  h1.hero-title .word { display: inline-block; overflow: hidden; vertical-align: bottom; }\n  h1.hero-title .word > span {\n    display: inline-block;\n    transform: translateY(0);\n    animation: wordIn 0.9s cubic-bezier(0.22,1,0.36,1) backwards;\n  }\n  h1.hero-title .word:nth-child(1) > span { animation-delay: 0.08s; }\n  h1.hero-title .word:nth-child(2) > span { animation-delay: 0.18s; }\n  h1.hero-title .word:nth-child(4) > span { animation-delay: 0.28s; }\n  @keyframes wordIn { from { transform: translateY(110%); } to { transform: translateY(0); } }\n\n  .hero-sub { font-size: 1.18rem; line-height: 1.6; color: var(--ink-soft); max-width: 40ch; margin-bottom: 32px; font-weight: 500; }\n  .hero-cta-row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }\n  .btn-primary {\n    background: var(--pink);\n    color: var(--cream);\n    padding: 17px 30px;\n    border-radius: 999px;\n    text-decoration: none;\n    font-weight: 700;\n    font-size: 1.05rem;\n    display: inline-flex; align-items: center; gap: 12px;\n    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;\n    border: 0; cursor: pointer; font-family: inherit;\n    box-shadow: 0 8px 0 var(--pink-deep);\n  }\n  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 0 var(--pink-deep); }\n  .btn-primary:active { transform: translateY(4px); box-shadow: 0 4px 0 var(--pink-deep); }\n  .btn-ghost {\n    background: transparent;\n    color: var(--ink);\n    padding: 17px 28px;\n    border: 2px solid var(--ink);\n    border-radius: 999px;\n    text-decoration: none;\n    font-weight: 700;\n    font-size: 1.05rem;\n    display: inline-flex; align-items: center; gap: 10px;\n    transition: background 0.2s, color 0.2s;\n  }\n  .btn-ghost:hover { background: var(--ink); color: var(--cream); }\n\n  .hero-stats { display: flex; gap: 36px; margin-top: 52px; padding-top: 28px; border-top: 2px dashed var(--line); }\n  .hero-stats .num { font-family: 'Secular One', sans-serif; font-size: 2.6rem; line-height: 1; color: var(--pink); }\n  .hero-stats .label { font-size: 0.85rem; color: var(--ink-soft); margin-top: 6px; font-weight: 600; }\n\n  /* Hero visual */\n  .hero-visual { position: relative; aspect-ratio: 4/5; }\n  .hv-main {\n    position: absolute; inset: 0;\n    border-radius: 40px 40px 40px 120px;\n    overflow: hidden;\n    box-shadow: 0 30px 60px -18px rgba(33,6,15,0.35);\n    border: 6px solid var(--paper);\n  }\n  .hv-main img { width: 100%; height: 100%; object-fit: cover; }\n  .hv-chip {\n    position: absolute;\n    width: 30%; aspect-ratio: 1;\n    border-radius: 24px;\n    overflow: hidden;\n    border: 5px solid var(--paper);\n    box-shadow: 0 16px 30px -10px rgba(33,6,15,0.3);\n    bottom: -5%; left: -6%;\n    transform: rotate(-8deg);\n    animation: floatB 6s ease-in-out infinite;\n  }\n  .hv-chip img { width:100%; height:100%; object-fit: cover; }\n  @keyframes floatB { 0%,100%{transform:rotate(-8deg) translateY(0)} 50%{transform:rotate(-8deg) translateY(-12px)} }\n  .hv-badge {\n    position: absolute;\n    top: -4%; left: -6%;\n    background: var(--butter);\n    color: var(--ink);\n    width: 116px; height: 116px;\n    border-radius: 50%;\n    display: flex; flex-direction: column; align-items: center; justify-content: center;\n    text-align: center;\n    z-index: 5;\n    border: 4px solid var(--paper);\n    box-shadow: 0 12px 24px -8px rgba(33,6,15,0.35);\n    transform: rotate(-12deg);\n  }\n  .hv-badge .price { font-family: 'Secular One', sans-serif; font-size: 1.9rem; line-height: 1; }\n  .hv-badge .lbl { font-size: 0.62rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }\n  .hv-star {\n    position: absolute; top: 38%; right: -7%;\n    background: var(--pink); color: var(--cream);\n    padding: 12px 18px; border-radius: 16px;\n    font-family: 'Secular One', sans-serif; font-size: 1.1rem;\n    transform: rotate(6deg); z-index: 5;\n    box-shadow: 0 10px 20px -6px rgba(33,6,15,0.35);\n    animation: floatA 5s ease-in-out infinite;\n  }\n  @keyframes floatA { 0%,100%{transform:rotate(6deg) translateY(0)} 50%{transform:rotate(6deg) translateY(-10px)} }\n\n  /* Press row */\n  .press-row {\n    background: var(--pink);\n    color: var(--cream);\n    padding: 0;\n    overflow: hidden;\n  }\n  .press-track {\n    display: flex;\n    animation: marquee 28s linear infinite;\n    white-space: nowrap;\n    width: max-content;\n    padding: 22px 0;\n  }\n  .press-track span {\n    font-family: 'Secular One', sans-serif;\n    font-size: 1.7rem;\n    padding: 0 28px;\n    display: inline-flex; align-items: center; gap: 28px;\n  }\n  .press-track span::after { content: \"♥\"; color: var(--butter); font-size: 1.3rem; }\n\n  /* Section base */\n  section { padding: 110px 40px; position: relative; }\n  .section-header {\n    display: flex; align-items: flex-end; justify-content: space-between;\n    gap: 24px; margin-bottom: 64px; flex-wrap: wrap;\n  }\n  .section-head-left { display: flex; align-items: center; gap: 18px; }\n  .section-num {\n    font-family: 'Secular One', sans-serif;\n    font-size: 1.4rem;\n    background: var(--ink); color: var(--cream);\n    width: 54px; height: 54px; border-radius: 16px;\n    display: flex; align-items: center; justify-content: center;\n    transform: rotate(-5deg);\n    flex-shrink: 0;\n  }\n  .section-title {\n    font-family: 'Secular One', sans-serif;\n    font-size: clamp(2.5rem, 5.5vw, 4.6rem);\n    line-height: 0.95;\n    letter-spacing: -0.02em;\n  }\n  .section-title .hl { color: var(--pink); }\n  .section-meta { font-weight: 700; color: var(--ink-soft); font-size: 0.95rem; }\n\n  /* About */\n  .about-grid { display: grid; grid-template-columns: 1fr 1.15fr; gap: 70px; align-items: center; }\n  .about-img {\n    aspect-ratio: 4/5; border-radius: 40px 120px 40px 40px;\n    overflow: hidden; position: relative;\n    border: 6px solid var(--paper);\n    box-shadow: 0 30px 60px -18px rgba(33,6,15,0.3);\n  }\n  .about-img img { width:100%; height:100%; object-fit: cover; }\n  .about-img .tag {\n    position: absolute; bottom: 20px; right: 20px;\n    background: var(--butter); padding: 10px 18px; border-radius: 999px;\n    font-weight: 800; font-size: 0.85rem; transform: rotate(-3deg);\n  }\n  .about-text .quote {\n    font-family: 'Secular One', sans-serif;\n    font-size: clamp(1.9rem, 3.4vw, 3rem);\n    line-height: 1.12; color: var(--ink); margin-bottom: 26px;\n    letter-spacing: -0.01em;\n  }\n  .about-text .quote .hl { color: var(--pink); }\n  .about-text p { font-size: 1.08rem; line-height: 1.75; color: var(--ink-soft); max-width: 50ch; margin-bottom: 16px; font-weight: 500; }\n  .about-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 38px; }\n  .about-stats .stat {\n    background: var(--paper); border-radius: 22px; padding: 22px 20px;\n    border-bottom: 5px solid var(--pink-soft);\n  }\n  .stat .num { font-family: 'Secular One', sans-serif; font-size: 2.6rem; line-height: 1; color: var(--pink); }\n  .stat .label { font-size: 0.82rem; color: var(--ink-soft); margin-top: 6px; font-weight: 600; }\n\n  /* Course */\n  .course { background: var(--wine); color: var(--cream); }\n  .course .section-num { background: var(--butter); color: var(--ink); }\n  .course .section-title .hl { color: var(--butter); }\n  .course .section-meta { color: var(--pink-soft); }\n  .course-grid { display: grid; grid-template-columns: 1.05fr 1fr; gap: 70px; align-items: center; }\n  .course-headline {\n    font-family: 'Secular One', sans-serif;\n    font-size: clamp(2.4 ircle><\u002Fsvg><\u002Fspan>\n        <span class=\"logo-text\" style=\"color:var(--cream)\">תהל<small style=\"color:var(--butter)\">Makeup Studio<\u002Fsmall><\u002Fspan>\n      <\u002Fdiv>\n      <p>סדנאות איפור לנערות 12-16. סטודיו אינטימי בפתח תקווה. ארבעה מפגשים, חמש בנות בלבד, בסיס לכל החיים.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"footer-col\">\n      <h4>ניווט<\u002Fh4>\n      <a href=\"#about\">אודות<\u002Fa><a href=\"#course\">הקורס<\u002Fa><a href=\"#curriculum\">תוכנית<\u002Fa><a href=\"#gallery\">גלריה<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"footer-col\">\n      <h4>צרי קשר<\u002Fh4>\n      <a href=\"tel:0523753300\">052-375-3300<\u002Fa><a href=\"#\">@tahel.makeup<\u002Fa><a href=\"#contact\">טופס הרשמה<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"footer-col\">\n      <h4>סטודיו<\u002Fh4>\n      <a href=\"#\">ישעיהו משורר 18<\u002Fa><a href=\"#\">פתח תקווה<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"footer-bottom\">\n    <span>© 2026 תהל · MAKEUP STUDIO<\u002Fspan>\n    <span>נבנה באהבה לאמניות צעירות ♥<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });\n  }, { threshold: 0.1 });\n  document.querySelectorAll('.reveal').forEach(el => io.observe(el));\n\n  document.querySelectorAll('.faq-item').forEach(item => {\n    item.addEventListener('click', () => item.classList.toggle('open'));\n  });\n\n  const slider = document.getElementById('baSlider');\n  const after = document.getElementById('baAfter');\n  const handle = document.getElementById('baHandle');\n  let dragging = false;\n  function setSlider(x) {\n    const r = slider.getBoundingClientRect();\n    let p = ((x - r.left) / r.width) * 100;\n    p = Math.max(0, Math.min(100, p));\n    after.style.clipPath = `inset(0 0 0 ${p}%)`;\n    handle.style.left = p + '%';\n  }\n  slider.addEventListener('mousedown', e => { dragging = true; setSlider(e.clientX); });\n  window.addEventListener('mousemove', e => { if (dragging) setSlider(e.clientX); });\n  window.addEventListener('mouseup', () => dragging = false);\n  slider.addEventListener('touchstart', e => { dragging = true; setSlider(e.touches[0].clientX); }, {passive:true});\n  slider.addEventListener('touchmove', e => { if (dragging) setSlider(e.touches[0].clientX); }, {passive:true});\n  slider.addEventListener('touchend', () => dragging = false);\n\n  // Tahel's WhatsApp number (Israeli 052-375-3300 → international format)\n  const TAHEL_WHATSAPP = '972523753300';\n  document.getElementById('contactForm').addEventListener('submit', e => {\n    e.preventDefault();\n    const f = e.target;\n    const name = (f.name.value || '').trim();\n    const parent = (f.parent.value || '').trim();\n    const phone = (f.phone.value || '').trim();\n    const age = f.age.value;\n    const msg = (f.msg.value || '').trim();\n\n    const lines = [\n      'היי תהל! אשמח לפרטים על קורס האיפור ✨',\n      '',\n      'שם הנערה: ' + (name || '—'),\n      parent ? 'שם הורה: ' + parent : null,\n      'טלפון: ' + (phone || '—'),\n      'גיל: ' + age,\n      msg ? 'הודעה: ' + msg : null\n    ].filter(Boolean);\n\n    const url = 'https://wa.me/' + TAHEL_WHATSAPP + '?text=' + encodeURIComponent(lines.join('\\n'));\n    window.open(url, '_blank');\n\n    const btn = f.querySelector('.submit-btn');\n    btn.innerHTML = '✓ נפתח וואטסאפ — שלחי לנו!';\n    setTimeout(() => { btn.innerHTML = 'שלחי לי פרטים בוואטסאפ →'; f.reset(); }, 4000);\n  });\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
